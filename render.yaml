## Multimodal Agentic RAG — Render Blueprint
## One-click deploy: https://render.com/docs/blueprint-spec

services:

  # ── FastAPI Backend (Docker) ──────────────────────────────────
  - type: web
    name: agentic-rag-backend
    runtime: docker
    dockerfilePath: docker/Dockerfile.backend
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "8000"
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      # Update ALLOWED_ORIGINS with your actual frontend URL after first deploy
      - key: ALLOWED_ORIGINS
        value: https://agentic-rag-frontend.onrender.com
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: MONGODB_DB_NAME
        value: agentic_rag
      - key: QDRANT_COLLECTION
        value: documents
      - key: REDIS_TTL
        value: "3600"
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: EMBEDDING_DIM
        value: "1536"
      - key: MAX_FILE_SIZE_MB
        value: "50"
      # Injected automatically from Render Redis
      - key: REDIS_URL
        fromService:
          type: redis
          name: agentic-rag-redis
          property: connectionString
      # ── Secrets: set these in the Render Dashboard ─────────────
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URL
        sync: false        # MongoDB Atlas: mongodb+srv://user:pass@cluster.mongodb.net
      - key: QDRANT_URL
        sync: false        # Qdrant Cloud: https://xxxx.qdrant.io
      - key: QDRANT_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false

  # ── React Frontend (Static Site) ─────────────────────────────
  - type: static
    name: agentic-rag-frontend
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://agentic-rag-backend.onrender.com/api
      - key: VITE_WS_URL
        value: wss://agentic-rag-backend.onrender.com/ws
      - key: VITE_APP_NAME
        value: AgenticRAG

# ── Managed Redis ─────────────────────────────────────────────
  - type: redis
    name: agentic-rag-redis
    plan: free
    ipAllowList: []
